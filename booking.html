<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookUtsav - Seat Selection</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .booking-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--space-xl);
            padding: var(--space-xl) 0;
            min-height: calc(100vh - 80px);
            margin-top: 80px;
        }
        
        @media (max-width: 992px) {
            .booking-layout { grid-template-columns: 1fr; }
        }
        
        /* Seat Map */
        .stage {
            width: 80%;
            height: 60px;
            margin: 0 auto var(--space-xl);
            background: linear-gradient(180deg, rgba(0, 240, 255, 0.3) 0%, transparent 100%);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            letter-spacing: 5px;
            color: var(--accent-primary);
            text-transform: uppercase;
            box-shadow: 0 -10px 30px rgba(0, 240, 255, 0.2);
        }
        
        .seat-map {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 15px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .seat {
            aspect-ratio: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 8px 8px 4px 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .seat::after {
            content: '';
            position: absolute;
            bottom: 2px; left: 10%; right: 10%;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        
        .seat:hover:not(.booked) {
            transform: scale(1.1);
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }
        
        .seat.selected {
            background: var(--accent-primary);
            border-color: #fff;
            box-shadow: 0 0 15px var(--accent-primary);
        }
        
        .seat.booked {
            background: rgba(255, 0, 85, 0.2);
            border-color: rgba(255, 0, 85, 0.5);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .seat.vip {
            border-color: #ffd700;
        }
        .seat.vip::after { background: #ffd700; }
        
        /* Legends */
        .legend {
            display: flex;
            justify-content: center;
            gap: var(--space-lg);
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border-glass);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .legend-box { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border-glass); }
        
        /* Summary Box */
        .summary-box {
            position: sticky;
            top: 100px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="event-details.html" style="display:flex; align-items:center; gap:10px;">
                    <div class="btn-icon" style="width:32px; height:32px; border:none; background:transparent;"><i class="fa-solid fa-arrow-left"></i></div>
                    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
                    BookUtsav
                </a>
            </div>
            <div class="steps text-secondary text-sm hidden md:block">
                <span class="text-primary font-bold">1. Seat Selection</span> &mdash; 2. Payment &mdash; 3. Ticket
            </div>
        </div>
    </header>

    <main class="container page-transition-enter">
        <div class="booking-layout">
            
            <!-- Left Column: Seat Map -->
            <div class="glass-panel" style="padding: var(--space-2xl) var(--space-md);">
                <div class="stage">Main Stage</div>
                
                <div id="seatMap" class="seat-map">
                    <!-- Seats generated via JS -->
                </div>
                
                <div class="legend">
                    <div class="legend-item"><div class="legend-box" style="background: var(--bg-glass);"></div> Available</div>
                    <div class="legend-item"><div class="legend-box" style="background: var(--accent-primary);"></div> Selected</div>
                    <div class="legend-item"><div class="legend-box" style="border-color: #ffd700;"></div> VIP</div>
                    <div class="legend-item"><div class="legend-box" style="background: rgba(255, 0, 85, 0.2); border-color: rgba(255, 0, 85, 0.5);"></div> Booked</div>
                </div>
            </div>
            
            <!-- Right Column: Summary -->
            <div>
                <div class="glass-card summary-box animated-border">
                    <h3 class="mb-3" style="border-bottom: 1px solid var(--border-glass); padding-bottom: 10px;">Booking Summary</h3>
                    
                    <div class="mb-3">
                        <div class="text-secondary text-sm mb-1">Selected Seats</div>
                        <div id="selectedSeats" class="font-bold text-primary" style="font-size: 1.1rem; min-height: 24px;">None</div>
                    </div>
                    
                    <div class="flex justify-between items-center mb-3">
                        <div class="text-secondary">Subtotal</div>
                        <div id="totalPrice" class="font-bold text-xl">$0</div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="floating-label-group">
                            <input type="text" class="form-control" placeholder=" ">
                            <label>Promo Code (Optional)</label>
                        </div>
                    </div>
                    
                    <button id="checkoutBtn" class="btn btn-primary" style="width: 100%;" disabled>
                        Proceed to Payment
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
