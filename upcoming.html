<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookUtsav - Upcoming Events</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .timeline {
            position: relative;
            max-width: 800px;
            margin: var(--space-2xl) auto;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 20px;
            width: 2px;
            background: var(--gradient-primary);
            box-shadow: var(--shadow-neon);
        }
        
        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: var(--space-xl);
        }
        
        .timeline-dot {
            position: absolute;
            left: 11px; top: 0;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--bg-base);
            border: 4px solid var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
            z-index: 2;
        }
        
        .timeline-date {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: var(--space-sm);
            display: inline-block;
        }
        
        .event-slider {
            display: flex;
            gap: var(--space-md);
            overflow-x: auto;
            padding-bottom: var(--space-md);
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        
        .event-slider::-webkit-scrollbar { display: none; }
        
        .slider-card {
            min-width: 300px;
            scroll-snap-align: start;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="discovery.html" style="display:flex; align-items:center; gap:10px;">
                    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
                    BookUtsav
                </a>
            </div>
            <nav class="nav-links">
                <a href="discovery.html" class="nav-link">Discover</a>
                <a href="upcoming.html" class="nav-link active">Upcoming</a>
                <a href="my-bookings.html" class="nav-link">My Tickets</a>
                <a href="account.html" class="btn-icon"><i class="fa-regular fa-user"></i></a>
            </nav>
        </div>
    </header>

    <main class="container main-content page-transition-enter">
        <h1 class="text-gradient mt-4 text-center">Event Horizon</h1>
        <p class="text-secondary text-center mb-5">A timeline of the most anticipated upcoming experiences.</p>
        
        <div class="timeline" id="timelineContainer">
            <!-- Timeline injected via JS -->
        </div>
    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="discovery.html" class="mobile-nav-item"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
        <a href="upcoming.html" class="mobile-nav-item active"><i class="fa-regular fa-calendar"></i><span>Upcoming</span></a>
        <a href="my-bookings.html" class="mobile-nav-item"><i class="fa-solid fa-ticket"></i><span>Tickets</span></a>
        <a href="account.html" class="mobile-nav-item"><i class="fa-regular fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('timelineContainer');
            let events = window.dataManager.getEvents();
            
            // Sort by date closest to farthest
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // Group by month
            const grouped = {};
            events.forEach(evt => {
                const dateObj = new Date(evt.date);
                const monthYear = dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!grouped[monthYear]) grouped[monthYear] = [];
                grouped[monthYear].push(evt);
            });
            
            let delay = 1;
            for (const [month, monthEvents] of Object.entries(grouped)) {
                const tlItem = document.createElement('div');
                tlItem.className = `timeline-item stagger-${delay}`;
                
                let cardsHtml = monthEvents.map(evt => {
                    const day = new Date(evt.date).getDate();
                    return `
                        <div class="glass-card slider-card" onclick="localStorage.setItem('currentEventId', '${evt.id}'); window.location.href='event-details.html';" style="cursor:pointer;">
                            <div class="event-card-img-wrapper" style="height: 120px;">
                                <img src="${evt.image}" alt="${evt.title}" class="event-card-img">
                            </div>
                            <div class="mt-2">
                                <span class="badge badge-primary mb-1">Day ${day}</span>
                                <h4 style="margin-bottom: 5px;">${evt.title}</h4>
                                <div class="text-secondary text-sm"><i class="fa-solid fa-location-dot"></i> ${evt.location}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                tlItem.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="timeline-date">${month}</div>
                    <div class="event-slider">
                        ${cardsHtml}
                    </div>
                `;
                
                container.appendChild(tlItem);
                delay = (delay % 5) + 1;
            }
        });
    </script>
</body>
</html>
