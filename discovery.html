<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookUtsav - Event Discovery</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .search-hero {
            padding: var(--space-4xl) 0;
            text-align: center;
            background: radial-gradient(circle at top, rgba(112, 0, 255, 0.15) 0%, transparent 50%);
        }
        
        .search-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-input {
            width: 100%;
            padding: 1.25rem 1.25rem 1.25rem 3.5rem;
            font-size: 1.2rem;
            border-radius: var(--radius-pill);
            background: var(--bg-surface);
            border: 2px solid var(--border-glass);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            background: rgba(0,0,0,0.6);
        }
        
        .search-icon {
            position: absolute;
            left: 1.25rem;
            color: var(--accent-primary);
            font-size: 1.2rem;
        }
        
        /* Filters */
        .filter-scroll {
            display: flex;
            gap: var(--space-md);
            overflow-x: auto;
            padding: var(--space-md) 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .filter-scroll::-webkit-scrollbar { display: none; }
        
        .filter-chip {
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-pill);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-chip:hover, .filter-chip.active {
            background: var(--gradient-primary);
            border-color: transparent;
            color: #fff;
            box-shadow: var(--shadow-neon);
        }
        
        /* Event Grid */
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-lg);
            padding: var(--space-xl) 0;
        }
        
        .event-card {
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .event-card-content { flex: 1; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
                BookUtsav
            </div>
            <nav class="nav-links">
                <a href="discovery.html" class="nav-link active">Discover</a>
                <a href="upcoming.html" class="nav-link">Upcoming</a>
                <a href="my-bookings.html" class="nav-link">My Tickets</a>
                <a href="account.html" class="btn-icon"><i class="fa-regular fa-user"></i></a>
            </nav>
        </div>
    </header>

    <main class="main-content container page-transition-enter">
        
        <!-- Search Hero -->
        <section class="search-hero">
            <h1 class="text-gradient" style="font-size: 3.5rem;">Find Your Next Experience</h1>
            <p class="text-secondary mb-4 typing-effect" style="max-width: fit-content; margin: 0 auto var(--space-xl);">Immersive concerts, tech summits, and VIP events.</p>
            
            <div class="search-container">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search events, artists, or locations...">
                </div>
            </div>
            
            <div class="filter-scroll mt-3 flex items-center" id="categoryFilters">
                <div class="filter-chip active" data-filter="All">All Events</div>
                <div class="filter-chip" data-filter="Concert">Concerts</div>
                <div class="filter-chip" data-filter="Tech">Tech</div>
                <div class="filter-chip" data-filter="Gaming">Gaming</div>
                <div class="filter-chip" data-filter="Dance">Dance</div>
                <div class="filter-chip" data-filter="Music">Music</div>
                <div class="btn btn-outline ml-auto" id="advancedFiltersBtn" style="padding: 0.5rem 1rem; font-size: 0.8rem; flex-shrink: 0;"><i class="fa-solid fa-sliders"></i> Filters</div>
            </div>
            
            <!-- Advanced Filters Panel -->
            <div id="advancedFiltersPanel" class="glass-card mt-3" style="display: none; text-align: left;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div>
                        <label class="text-secondary mb-2" style="display: block; font-size: 0.875rem;">Max Price</label>
                        <input type="range" min="0" max="1000" value="500" style="width: 100%; accent-color: var(--accent-primary);" oninput="document.getElementById('priceRangeDisplay').innerText = '$' + this.value">
                        <div class="flex justify-between text-sm mt-1">
                            <span>$0</span>
                            <span class="text-primary font-bold" id="priceRangeDisplay">$500</span>
                        </div>
                    </div>
                    <div>
                        <label class="text-secondary mb-2" style="display: block; font-size: 0.875rem;">Date After</label>
                        <input type="date" class="form-control" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);">
                    </div>
                    <div>
                        <label class="text-secondary mb-2" style="display: block; font-size: 0.875rem;">Location Status</label>
                        <select class="form-control" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);">
                            <option>In-Person & Virtual</option>
                            <option>In-Person Only</option>
                            <option>Virtual / Metaverse</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4" style="text-align: right;">
                    <button class="btn btn-primary" id="applyFiltersBtn">Apply Algorithms</button>
                </div>
            </div>
        </section>

        <!-- Events Grid -->
        <section>
            <div class="flex justify-between items-center mb-2">
                <h2>Trending Experiences</h2>
            </div>
            
            <div class="event-grid" id="eventsGrid">
                <!-- Dynamically populated by JS -->
            </div>
        </section>

    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="discovery.html" class="mobile-nav-item active"><i class="fa-solid fa-compass"></i><span>Explore</span></a>
        <a href="upcoming.html" class="mobile-nav-item"><i class="fa-regular fa-calendar"></i><span>Upcoming</span></a>
        <a href="my-bookings.html" class="mobile-nav-item"><i class="fa-solid fa-ticket"></i><span>Tickets</span></a>
        <a href="account.html" class="mobile-nav-item"><i class="fa-regular fa-user"></i><span>Profile</span></a>
    </nav>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('eventsGrid');
            const searchInput = document.getElementById('searchInput');
            const chips = document.querySelectorAll('.filter-chip');
            let currentFilter = 'All';
            
            function renderEvents(filterText = '') {
                grid.innerHTML = '';
                let events = window.dataManager.getEvents();
                
                // Apply Category Filter
                if (currentFilter !== 'All') {
                    events = events.filter(e => e.category === currentFilter);
                }
                
                // Apply Search Text
                if (filterText) {
                    const lower = filterText.toLowerCase();
                    events = events.filter(e => 
                        e.title.toLowerCase().includes(lower) || 
                        e.location.toLowerCase().includes(lower)
                    );
                }
                
                if(events.length === 0) {
                    grid.innerHTML = '<div class="text-secondary mt-4">No experiences found matching your criteria.</div>';
                    return;
                }
                
                events.forEach((evt, index) => {
                    const dateObj = new Date(evt.date);
                    const month = dateObj.toLocaleString('default', { month: 'short' });
                    const day = dateObj.getDate();
                    
                    const card = document.createElement('div');
                    card.className = `glass-card event-card stagger-${(index % 5) + 1}`;
                    card.innerHTML = `
                        <div class="event-card-img-wrapper">
                            <img src="${evt.image}" alt="${evt.title}" class="event-card-img">
                            <div class="event-date-badge">
                                <span class="day">${day}</span>
                                <span class="month">${month}</span>
                            </div>
                        </div>
                        <div class="event-card-content">
                            <div class="flex justify-between items-center mb-1 mt-2">
                                <span class="badge badge-primary">${evt.category}</span>
                                <span class="text-primary font-bold">From $${evt.price}</span>
                            </div>
                            <h3 class="mt-1" style="font-size: 1.25rem;">${evt.title}</h3>
                            <p class="text-secondary mt-auto" style="font-size: 0.875rem;">
                                <i class="fa-solid fa-location-dot"></i> ${evt.location}
                            </p>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => {
                        localStorage.setItem('currentEventId', evt.id);
                        window.location.href = 'event-details.html';
                    });
                    
                    grid.appendChild(card);
                });
            }
            
            // Initial Render
            renderEvents();
            
            // Search Input Event
            searchInput.addEventListener('input', (e) => {
                renderEvents(e.target.value);
            });
            
            // Category Filters
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    chips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.dataset.filter;
                    renderEvents(searchInput.value);
                });
            });
            
            // Advanced Filters Event
            const advFilterBtn = document.getElementById('advancedFiltersBtn');
            const advFilterPanel = document.getElementById('advancedFiltersPanel');
            if(advFilterBtn && advFilterPanel) {
                advFilterBtn.addEventListener('click', () => {
                    const isHidden = advFilterPanel.style.display === 'none';
                    advFilterPanel.style.display = isHidden ? 'block' : 'none';
                    if(isHidden) advFilterPanel.classList.add('page-transition-enter');
                });
                
                document.getElementById('applyFiltersBtn').addEventListener('click', () => {
                    advFilterPanel.style.display = 'none';
                    if(window.showToast) {
                        window.showToast('Filters Applied', 'Event discovery matrix updated.', 'success');
                    }
                });
            }
        });
    </script>
</body>
</html>
