<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BookUtsav - The Future of Events</title>
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-md);
            position: relative;
            z-index: 10;
        }
        
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: var(--space-xl);
            text-align: center;
        }
        
        .auth-logo {
            margin-bottom: var(--space-lg);
            display: inline-block;
        }
        
        .social-login {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            margin-top: var(--space-lg);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: var(--space-lg) 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-glass);
        }
        
        .divider::before { margin-right: var(--space-md); }
        .divider::after { margin-left: var(--space-md); }
        
        .auth-switch {
            margin-top: var(--space-lg);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .auth-switch a {
            color: var(--accent-primary);
            font-weight: 600;
        }
        
        .floating-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        
        .orb-1 {
            width: 300px; height: 300px;
            background: var(--accent-secondary);
            top: 10%; left: -10%;
        }
        
        .orb-2 {
            width: 250px; height: 250px;
            background: var(--accent-primary);
            bottom: -5%; right: -5%;
            animation-delay: -5s;
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-particles">
            <!-- Simulated particles -->
            <div class="particle" style="left: 10%; animation-delay: 0.2s;"></div>
            <div class="particle" style="left: 30%; animation-delay: 1.5s;"></div>
            <div class="particle" style="left: 50%; animation-delay: 0.8s;"></div>
            <div class="particle" style="left: 70%; animation-delay: 2.1s;"></div>
            <div class="particle" style="left: 90%; animation-delay: 1.1s;"></div>
        </div>
        <div class="splash-logo-container">
            <h1 class="splash-logo">BOOKUTSAV</h1>
        </div>
        <div style="margin-top: 30px;">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Background Orbs -->
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Auth Container -->
    <div id="authContainer" class="auth-wrapper">
        
        <div class="glass-card auth-card animated-border" style="padding: 0; overflow: hidden; max-width: 450px;">
            <!-- Tab Switcher -->
            <div class="auth-tabs" style="display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-glass);">
                <div id="tabLogin" class="auth-tab active" style="flex: 1; padding: 1.25rem; cursor: pointer; transition: all 0.3s; font-weight: 600; letter-spacing: 1px; color: var(--accent-primary); border-bottom: 2px solid var(--accent-primary); background: rgba(0, 240, 255, 0.05);">LOGIN</div>
                <div id="tabSignup" class="auth-tab" style="flex: 1; padding: 1.25rem; cursor: pointer; transition: all 0.3s; font-weight: 600; letter-spacing: 1px; color: var(--text-secondary); border-bottom: 2px solid transparent;">SIGN UP</div>
            </div>

            <div style="padding: var(--space-xl);">
                <!-- Login Form -->
                <div id="loginForm">
                    <div class="auth-logo">
                        <h2 class="text-gradient"><i class="fa-solid fa-bolt"></i> BookUtsav</h2>
                        <p class="text-secondary mt-1">Enter the event horizon</p>
                    </div>
                    
                    <form>
                        <div class="floating-label-group">
                            <input type="email" id="loginEmail" class="form-control" placeholder=" " required>
                            <label>Email Address</label>
                        </div>
                        
                        <div class="floating-label-group">
                            <input type="password" id="loginPass" class="form-control" placeholder=" " required>
                            <label>Password</label>
                        </div>
                        
                        <div class="flex justify-between items-center mb-3 text-sm">
                            <label class="flex items-center gap-1 text-secondary" style="font-size: 0.875rem; cursor: pointer;">
                                <input type="checkbox" style="accent-color: var(--accent-primary);"> Remember me
                            </label>
                            <a href="#" id="forgotPassBtn" class="text-primary" style="color: var(--accent-primary); font-size: 0.875rem;">Forgot Password?</a>
                        </div>
                        
                        <button id="doLogin" class="btn btn-primary" style="width: 100%;">Initialize Session</button>
                    </form>
                    
                    <div class="divider">OR CONNECT WITH</div>
                    
                    <div class="social-login">
                        <button type="button" class="btn-icon social-btn" data-provider="Google"><i class="fab fa-google"></i></button>
                        <button type="button" class="btn-icon social-btn" data-provider="Apple"><i class="fab fa-apple"></i></button>
                        <button type="button" class="btn-icon social-btn" data-provider="GitHub"><i class="fab fa-github"></i></button>
                    </div>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" style="display: none;">
                    <div class="auth-logo">
                        <h2 class="text-gradient"><i class="fa-solid fa-user-astronaut"></i> Join BookUtsav</h2>
                        <p class="text-secondary mt-1">Create your digital presence</p>
                    </div>
                    
                    <form>
                        <div class="floating-label-group">
                            <input type="text" id="signupName" class="form-control" placeholder=" " required>
                            <label>Full Name</label>
                        </div>
                        
                        <div class="floating-label-group">
                            <input type="email" id="signupEmail" class="form-control" placeholder=" " required>
                            <label>Email Address</label>
                        </div>
                        
                        <div class="floating-label-group">
                            <input type="password" id="signupPass" class="form-control" placeholder=" " required>
                            <label>Password</label>
                        </div>
                        
                        <div class="mb-4 text-xs text-secondary" style="text-align: left;">
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="checkbox" checked style="accent-color: var(--accent-primary); margin-top: 3px;">
                                <span>I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>.</span>
                            </label>
                        </div>
                        
                        <button id="doSignup" class="btn btn-primary" style="width: 100%;">Generate Identity</button>
                    </form>
                    
                    <div class="divider">OR SIGN UP WITH</div>
                    
                    <div class="social-login">
                        <button type="button" class="btn-icon social-btn" data-provider="Google"><i class="fab fa-google"></i></button>
                        <button type="button" class="btn-icon social-btn" data-provider="Apple"><i class="fab fa-apple"></i></button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="btn-icon" style="position: fixed; top: 20px; right: 20px; z-index: 100;">
        <i class="fas fa-sun"></i>
    </button>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
